services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: ai_job_backend
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: ai_job_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped